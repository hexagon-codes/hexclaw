name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout hexagon
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/hexagon
          path: ../hexagon

      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/toolkit
          path: ../toolkit

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout hexagon
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/hexagon
          path: ../hexagon

      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/toolkit
          path: ../toolkit

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout hexagon
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/hexagon
          path: ../hexagon

      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/toolkit
          path: ../toolkit

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Build
        run: make build
