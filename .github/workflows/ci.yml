name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Run tests
        run: go test -race -count=1 ./...
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Run vet
        run: go vet ./...
        env:
          GOPRIVATE: github.com/hexagon-codes/*

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
        env:
          GOPRIVATE: github.com/hexagon-codes/*

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
        env:
          GOPRIVATE: github.com/hexagon-codes/*

      - name: Build
        run: make build
        env:
          GOPRIVATE: github.com/hexagon-codes/*
